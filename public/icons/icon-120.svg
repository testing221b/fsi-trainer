<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="120" height="120">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1e3a5f"/>
  <!-- Open book shape -->
  <rect x="80" y="160" width="152" height="192" rx="8" fill="#2563eb" opacity="0.9"/>
  <rect x="280" y="160" width="152" height="192" rx="8" fill="#2563eb" opacity="0.9"/>
  <!-- Spine -->
  <rect x="228" y="150" width="56" height="212" rx="4" fill="#1d4ed8"/>
  <!-- Lines on left page -->
  <rect x="100" y="200" width="112" height="8" rx="4" fill="white" opacity="0.8"/>
  <rect x="100" y="224" width="90" height="8" rx="4" fill="white" opacity="0.6"/>
  <rect x="100" y="248" width="112" height="8" rx="4" fill="white" opacity="0.8"/>
  <rect x="100" y="272" width="80" height="8" rx="4" fill="white" opacity="0.5"/>
  <rect x="100" y="296" width="112" height="8" rx="4" fill="white" opacity="0.8"/>
  <!-- Lines on right page -->
  <rect x="300" y="200" width="112" height="8" rx="4" fill="white" opacity="0.8"/>
  <rect x="300" y="224" width="90" height="8" rx="4" fill="white" opacity="0.6"/>
  <rect x="300" y="248" width="112" height="8" rx="4" fill="white" opacity="0.8"/>
  <rect x="300" y="272" width="80" height="8" rx="4" fill="white" opacity="0.5"/>
  <rect x="300" y="296" width="112" height="8" rx="4" fill="white" opacity="0.8"/>
  <!-- Star/graduation cap accent -->
  <circle cx="256" cy="120" r="24" fill="#f59e0b"/>
  <text x="256" y="128" text-anchor="middle" font-size="24" fill="white">★</text>
  <!-- FSI text at bottom -->
  <text x="256" y="410" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="52" fill="white" letter-spacing="8">FSI</text>
</svg>
